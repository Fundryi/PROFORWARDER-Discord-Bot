services:
  init-config:
    profiles: ["init"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proforwarder-init
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "==> Setting up config files"
        if [ ! -f /config/.env ]; then
          cp /app/.env.example /config/.env
          echo "    Created .env from example - EDIT WITH YOUR TOKENS"
        else
          echo "    .env already exists"
        fi
        echo "==> Setting permissions for UID 1001"
        chown -R 1001:1001 /data /config
        echo "==> Init complete"
    user: root
    healthcheck:
      disable: true
    volumes:
      - /srv/docker-data/proforwarder/data:/data
      - /srv/docker-data/proforwarder/config:/config
    restart: "no"

  proforwarder-bot:
    image: ghcr.io/fundryi/proforwarder-discord-bot/bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proforwarder-discord-bot
    restart: unless-stopped
    environment:
      <<: *bot-environment
      NODE_ENV: production
    volumes:
      - /srv/docker-data/proforwarder/data:/app/data
      - /srv/docker-data/proforwarder/config:/app/config:ro
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - proforwarder

  cloudflared:
    image: ghcr.io/fundryi/proforwarder-discord-bot/cloudflared:latest
    build:
      context: ./docker/cloudflared
    environment:
      <<: *cloudflared-environment
    depends_on:
      proforwarder-bot:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proforwarder
    profiles:
      - tunnel

networks:
  proforwarder:
    driver: bridge
