name: Block AI Co-Author

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Co-Authored-By in new commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
          fi

          # Skip check if RANGE contains all-zero (initial push)
          if echo "$RANGE" | grep -q "^0\{40\}"; then
            echo "Initial push — skipping check"
            exit 0
          fi

          FOUND=$(git log "$RANGE" --format="%H %b" | grep -i "Co-Authored-By" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Commits contain Co-Authored-By trailers. Remove them before merging."
            echo "$FOUND"
            exit 1
          fi
          echo "No Co-Authored-By trailers found."
